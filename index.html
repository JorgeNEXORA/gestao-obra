<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROARKH — Gestão de Obra</title>
<style>
:root{
  --bg:#0c0c0d; --surface:#141416; --surface2:#1b1b1e; --surface3:#222226;
  --border:#2c2c31; --accent:#c8f135; --accent2:#7c6dfa; --accent3:#38bdf8;
  --text:#efefef; --muted:#5a5a65; --danger:#ff4f4f; --success:#3dffa0; --warning:#ffb84d;
  --font:'Calibri','Candara','Segoe UI',sans-serif; --mono:'Consolas','Courier New',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font);height:100vh;overflow:hidden;display:flex;}
::-webkit-scrollbar{width:9px;height:9px;}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:5px;}
::-webkit-scrollbar-track{background:transparent;}

/* SIDEBAR */
.sidebar{width:230px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.logo{padding:22px 20px 20px;border-bottom:1px solid var(--border);}
.logo-name{font-size:17px;font-weight:800;color:var(--accent);letter-spacing:-0.3px;}
.logo-name span{color:var(--text);}
.logo-sub{font-size:10px;color:var(--muted);font-family:var(--mono);letter-spacing:2px;margin-top:2px;}
.nav-section{padding:16px 18px 6px;font-size:9px;color:var(--muted);font-family:var(--mono);letter-spacing:2px;text-transform:uppercase;}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 18px;cursor:pointer;color:var(--muted);font-size:14px;font-weight:600;transition:all .15s;border-left:2px solid transparent;white-space:nowrap;}
.nav-item:hover{color:var(--text);background:var(--surface2);}
.nav-item.active{color:var(--accent);border-left-color:var(--accent);background:rgba(200,241,53,.05);}
.nav-item .ico{width:18px;text-align:center;font-size:15px;}
.nav-badge{margin-left:auto;background:var(--danger);color:#fff;font-size:10px;font-family:var(--mono);border-radius:10px;padding:1px 7px;font-weight:700;}
.nav-scroll{flex:1;overflow-y:auto;}
.nav-item.chap{font-size:12.5px;padding:8px 18px 8px 20px;}
.nav-item.chap .cod{font-family:var(--mono);font-size:10px;color:var(--muted);min-width:26px;}
.nav-item.chap.active .cod{color:var(--accent);}
.sidebar-foot{padding:12px 18px;border-top:1px solid var(--border);font-size:10px;color:var(--muted);font-family:var(--mono);flex-shrink:0;}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{height:60px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;padding:0 24px;flex-shrink:0;background:var(--surface);}
.topbar h1{font-size:16px;font-weight:700;white-space:nowrap;}
.obra-select{margin-left:auto;display:flex;align-items:center;gap:10px;}
.obra-select label{font-size:10px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:1px;}
select,input,textarea{background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--font);font-size:13px;padding:7px 10px;outline:none;}
select:focus,input:focus,textarea:focus{border-color:var(--accent2);}
.content{flex:1;overflow-y:auto;padding:24px;}

/* BUTTONS */
.btn{background:var(--accent);border:none;border-radius:6px;color:#0c0c0d;font-family:var(--font);font-weight:700;font-size:13px;padding:8px 14px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn:hover{filter:brightness(1.1);}
.btn.sec{background:var(--surface3);color:var(--text);}
.btn.sec:hover{background:var(--border);}
.btn.pur{background:var(--accent2);color:#fff;}
.btn.dgr{background:transparent;color:var(--danger);border:1px solid transparent;padding:4px 8px;font-size:12px;}
.btn.dgr:hover{background:rgba(255,79,79,.1);}
.btn.sm{padding:5px 10px;font-size:12px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}

/* CARDS */
.grid{display:grid;gap:16px;}
.kpis{grid-template-columns:repeat(auto-fit,minmax(180px,1fr));margin-bottom:22px;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;}
.kpi .lbl{font-size:10px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.kpi .val{font-size:24px;font-weight:800;font-family:var(--mono);}
.kpi .sub{font-size:11px;color:var(--muted);margin-top:4px;}
.kpi.ok .val{color:var(--success);} .kpi.warn .val{color:var(--warning);} .kpi.bad .val{color:var(--danger);}
.kpi.acc .val{color:var(--accent);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px;}
.card h2{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.card h2 .btn{margin-left:auto;}
.card-head{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.card-head h2{margin:0;}
.card-head .btn{margin-left:auto;}

/* TABLE */
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;font-size:10px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:1px;padding:8px 10px;border-bottom:1px solid var(--border);font-weight:600;}
td{padding:8px 10px;border-bottom:1px solid var(--surface2);vertical-align:middle;}
tr:hover td{background:var(--surface2);}
td.num,th.num{text-align:right;font-family:var(--mono);}
.cap-row td{background:var(--surface3)!important;font-weight:700;}
.cap-row:hover td{background:var(--surface3)!important;}
.tbl-inp{width:100%;background:transparent;border:1px solid transparent;padding:4px 6px;font-size:13px;border-radius:4px;}
.tbl-inp:hover{border-color:var(--border);}
.tbl-inp:focus{border-color:var(--accent2);background:var(--bg);}
.tbl-inp.num{text-align:right;font-family:var(--mono);}
.mini{font-size:11px;color:var(--muted);font-family:var(--mono);}

/* BADGES */
.badge{display:inline-block;font-size:10px;font-family:var(--mono);padding:2px 8px;border-radius:20px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.badge.g{background:rgba(61,255,160,.12);color:var(--success);}
.badge.y{background:rgba(255,184,77,.14);color:var(--warning);}
.badge.o{background:rgba(255,138,0,.14);color:#ff8a00;}
.badge.r{background:rgba(255,79,79,.14);color:var(--danger);}
.badge.b{background:rgba(124,109,250,.16);color:var(--accent2);}
.badge.gray{background:var(--surface3);color:var(--muted);}

/* BAR */
.bar{height:6px;background:var(--surface3);border-radius:4px;overflow:hidden;min-width:60px;}
.bar-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .4s;}
.bar-fill.over{background:var(--danger);}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal-bg.show{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
.modal h3{font-size:16px;margin-bottom:18px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.field input,.field select,.field textarea{width:100%;}
.field-row{display:flex;gap:12px;}
.field-row .field{flex:1;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:22px;}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty .big{font-size:42px;margin-bottom:14px;opacity:.5;}
.empty p{font-size:14px;margin-bottom:18px;}
.hidden{display:none!important;}
.row-flex{display:flex;align-items:center;gap:10px;}
.spacer{flex:1;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent);color:#0c0c0d;font-weight:700;padding:12px 22px;border-radius:8px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;font-size:13px;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="logo">
    <div class="logo-name">PRO<span>ARKH</span></div>
    <div class="logo-sub">GESTÃO DE OBRA</div>
  </div>
  <div class="nav-scroll" id="navContainer"></div>
  <div class="sidebar-foot" id="footInfo">v2.1 · local</div>
</aside>

<div class="main">
  <div class="topbar">
    <h1 id="viewTitle">Resumo</h1>
    <div class="obra-select">
      <label>Obra</label>
      <select id="obraSelect" style="min-width:220px"></select>
      <button class="btn sm" id="newObraBtn">+ Obra</button>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal" id="modalBox"></div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ============ ESTADO / PERSISTÊNCIA (SERVIDOR) ============ */
const API = '/api';
let DB = { obras: [] };
let currentObraId = null;
let currentView = 'dashboard';

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

/* Carregar todas as obras do servidor */
async function boot(){
  try{
    const r = await fetch(API+'/obras');
    if(!r.ok) throw 0;
    DB.obras = await r.json();
    setOnline(true);
  }catch(e){
    setOnline(false);
    toast('Sem ligação ao servidor');
  }
  currentObraId = DB.obras[0]?.id || null;
  render();
}

/* Guardar a obra atual (debounced, com flush ao trocar de obra) */
let saveTimer = null, pendingObra = null;
function scheduleSave(){
  const o = obra(); if(!o) return;
  if(pendingObra && pendingObra.id !== o.id) saveObra(pendingObra); // flush da anterior
  pendingObra = o;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{ saveObra(o); pendingObra = null; }, 350);
}
async function saveObra(o){
  try{
    const r = await fetch(API+'/obras/'+o.id, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(o)});
    setOnline(r.ok);
  }catch(e){ setOnline(false); toast('Falha ao guardar — sem ligação'); }
}
async function deleteObraApi(id){
  try{ await fetch(API+'/obras/'+id, {method:'DELETE'}); }catch(e){}
}
function setOnline(ok){
  const el = document.getElementById('footInfo');
  if(el) el.innerHTML = ok ? 'v2.1 · <span style="color:var(--success)">● servidor</span>'
                           : 'v2.1 · <span style="color:var(--danger)">● offline</span>';
}

/* ============ HELPERS ============ */
const $ = s => document.querySelector(s);
const num = n => (n||0).toLocaleString('pt-PT',{minimumFractionDigits:2,maximumFractionDigits:2});
const pct = n => (n||0).toLocaleString('pt-PT',{minimumFractionDigits:1,maximumFractionDigits:1}) + '%';
const esc = s => (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function obra(){ return DB.obras.find(o=>o.id===currentObraId); }
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1800); }
function fmtDate(d){ if(!d) return '—'; const p=d.split('-'); return `${p[2]}/${p[1]}/${p[0]}`; }
function daysBetween(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }
function today(){ return new Date().toISOString().slice(0,10); }

/* CÁLCULOS */
const IVA = 23; // %
// Quantidade efetiva: se houver medição (comp×alt) usa a área menos deduções; senão usa qtd direta
function artigoQtd(a){
  const comp=+a.comp||0, alt=+a.alt||0, ded=+a.ded||0;
  if(comp>0 && alt>0) return Math.max(comp*alt-ded, 0);
  return +a.qtd||0;
}
function artigoPU(a){ return (a.puCusto!=null? +a.puCusto : +a.preco)||0; }  // compat: preco antigo
function artigoPV(a){ return artigoPU(a)*(1+(+a.margem||0)/100); }            // preço de venda c/ margem
function artigoTotal(a){ return artigoQtd(a)*artigoPV(a); }
function capTotal(c){ if(c.a05) return a05Total(c.a05); return c.artigos.reduce((s,a)=>s+artigoTotal(a),0); }
function orcTotal(o){ return o.capitulos.reduce((s,c)=>s+capTotal(c),0); }
function orcIVA(o){ return orcTotal(o)*IVA/100; }
function orcTotalComIVA(o){ return orcTotal(o)*(1+IVA/100); }

/* Capítulos padrão A01-A27 (cod, nome, tipo de medição, modo de entrada) — nomenclatura do Excel */
const STD_CHAPTERS = [
  ['A01','Trabalhos Preparatórios','Preço unitário (vg/un)','qtd'],
  ['A02','Fiscalização e Gestão de Obra','Preço unitário (mês/vg)','qtd'],
  ['A03','Demolições','Preço unitário (m²/m³)','qtd'],
  ['A04','Movimento de Terras','Preço unitário (m³)','qtd'],
  ['A05','Betão Armado e Estrutura','Dimensões + Armaduras','qtd'],
  ['A06','Alvenarias','Áreas (C×A)','area'],
  ['A07','Infraestruturas Hidráulicas','Linear / unitário','qtd'],
  ['A08','Infraestruturas Elétricas e ITED','Pontos + unitário','qtd'],
  ['A09','Betonilhas e Regularizações','Áreas (C×A)','area'],
  ['A10','Revestimentos Exteriores','Áreas (C×A)','area'],
  ['A11','Revestimentos Interiores','Áreas (C×A)','area'],
  ['A12','Impermeabilizações','Áreas (C×A)','area'],
  ['A13','Isolamentos Térmicos e Acústicos','Áreas (C×A)','area'],
  ['A14','Coberturas','Áreas + linear','area'],
  ['A15','Caixilharias','Unitário (vão a vão)','qtd'],
  ['A16','Serralharias','Linear + unitário','qtd'],
  ['A17','Gesso Cartonado','Áreas (C×A)','area'],
  ['A18','Carpintarias','Linear + unitário','qtd'],
  ['A19','Equipamentos Sanitários','Unitário (por peça)','qtd'],
  ['A20','Pinturas','Áreas (C×A)','area'],
  ['A21','Eletrodomésticos','Unitário (por peça)','qtd'],
  ['A22','Arranjos Exteriores','Áreas + linear','area'],
  ['A23','Mecanismos Elétricos','Unitário (por ponto)','qtd'],
  ['A24','Ligações e Taxas','Verba global (vg)','qtd'],
  ['A25','Ensaios e Certificações','Verba global (vg)','qtd'],
  ['A26','Custos de Obra','Verba global (vg)','qtd'],
  ['A27','Limpeza Final','Áreas + unitário','area'],
];
function chapMeta(cod){ return STD_CHAPTERS.find(s=>s[0]===cod); }
function capMode(c){ return c.modo || (STD_CHAPTERS.find(s=>c.nome && c.nome.startsWith(s[0]))||[])[3] || 'qtd'; }
// Obtém (ou cria) o capítulo da obra correspondente a um código A01-A27
function getCap(o, cod, create){
  let c = o.capitulos.find(x=>(x.cod===cod) || (x.nome||'').startsWith(cod));
  if(!c && create){ const m=chapMeta(cod); c={id:uid(),cod:cod,nome:cod+' · '+m[1],tipo:m[2],modo:m[3],artigos:[]}; if(cod==='A05') c.a05=a05New(); o.capitulos.push(c); }
  if(c && cod==='A05' && !c.a05) c.a05=a05New();
  return c;
}

/* ============ A05 — CÁLCULO DE BETÃO ARMADO E ESTRUTURA ============ */
const A05_DEFAULTS = {custoBetao:81.8,custoCofr:12,custoBomba:12,despBetao:0.05,despAco:0.12,pctArame:0.03,euroHora:18.49,prodBet:6,prodFerro:80,nHomCofr:3,nHomBet:4,nHomFerro:2,indiretos:0.15,garantia:0.05,margem:0.20,precoO8:1.14,precoO12:1.09,espLimpeza:0.10,euroMagro:70,folga:0.05};
const A05_PARAM_LABELS = {custoBetao:'Custo betão (€/m³)',custoCofr:'Custo cofragem (€/m²)',custoBomba:'Custo bomba (€/m³)',despBetao:'Desp. betão',despAco:'Desp. aço',pctArame:'% Arame',euroHora:'€/h homem',prodBet:'Prod. betão (m³/h)',prodFerro:'Prod. ferro (kg/h)',nHomCofr:'Nº homens cofr.',nHomBet:'Nº homens betão',nHomFerro:'Nº homens ferro',indiretos:'Indiretos',garantia:'Garantia',margem:'Margem',precoO8:'Preço Ø8 (€/kg)',precoO12:'Preço Ø12 (€/kg)',espLimpeza:'Esp. limpeza (m)',euroMagro:'€/m³ betão magro',folga:'Folga lateral (m)'};
const A05_TIPOS = [
  {key:'sapatas',   nome:'Sapatas Isoladas',    dims:['L','B','H'], taxa:80,  prodCofr:5,   cof:d=>2*(d[0]+d[1])*d[2],  limpeza:(d,p)=>(d[0]+2*p.folga)*(d[1]+2*p.folga)*p.espLimpeza*p.euroMagro},
  {key:'pilares',   nome:'Pilares',             dims:['a','b','h'], taxa:100, prodCofr:9.3, cof:d=>2*(d[0]+d[1])*d[2],  limpeza:()=>0},
  {key:'vigasFund', nome:'Vigas de Fundação',   dims:['L','b','h'], taxa:100, prodCofr:6,   cof:d=>(2*d[2]+d[1])*d[0], limpeza:(d,p)=>(d[1]+2*p.folga)*d[0]*p.espLimpeza*p.euroMagro},
  {key:'vigasCarga',nome:'Vigas de Carga',      dims:['L','b','h'], taxa:100, prodCofr:7,   cof:d=>(2*d[2]+d[1])*d[0], limpeza:()=>0},
];
function a05Tipo(key){ return A05_TIPOS.find(t=>t.key===key); }
function a05New(){ return {params:{...A05_DEFAULTS}, tipos:{sapatas:[],pilares:[],vigasFund:[],vigasCarga:[]}, sub:'sapatas'}; }
function a05Params(a05){ return {...A05_DEFAULTS, ...(a05.params||{})}; }
function a05Calc(el, tipo, p){
  const d = tipo.dims.map(k=>+el[k]||0);
  const volu = d[0]*d[1]*d[2];
  const qtd = +el.qtd||0;
  const volDesp = volu*qtd*(1+p.despBetao);
  const cofu = volu>0? tipo.cof(d) : 0;
  const coft = cofu*qtd;
  const acoObra = volu*tipo.taxa*qtd*(1+p.despAco);
  const arame = acoObra*p.pctArame;
  const betaoE = volDesp*p.custoBetao;
  const cofrE = coft*p.custoCofr;
  const acoE = acoObra*p.precoO12;
  const arameE = arame*p.precoO8;
  const bombaE = volDesp*p.custoBomba;
  const limpezaE = (volu>0? tipo.limpeza(d,p):0)*qtd;
  const totalMat = betaoE+cofrE+acoE+arameE+bombaE+limpezaE;
  const hCof = tipo.prodCofr>0? coft/tipo.prodCofr:0;
  const hBet = p.prodBet>0? volDesp/p.prodBet:0;
  const hFerro = p.prodFerro>0? acoObra/p.prodFerro:0;
  const moE = (hCof*p.nHomCofr + hBet*p.nHomBet + hFerro*p.nHomFerro)*p.euroHora;
  const direto = totalMat+moE;
  const indir = direto*p.indiretos;
  const gar = (direto+indir)*p.garantia;
  const subtotal = direto+indir+gar;
  const lucro = subtotal*p.margem;
  const total = subtotal+lucro;
  return {volu,volDesp,coft,acoObra,totalMat,moE,total, puElem: qtd>0?total/qtd:0, puM3:(volu*qtd)>0?total/(volu*qtd):0};
}
function a05TipoTotal(a05, key){ const t=a05Tipo(key); const p=a05Params(a05); return (a05.tipos[key]||[]).reduce((s,el)=>s+a05Calc(el,t,p).total,0); }
function a05Total(a05){ if(!a05) return 0; return A05_TIPOS.reduce((s,t)=>s+a05TipoTotal(a05,t.key),0); }
function allArtigos(o){ return o.capitulos.flatMap(c=>c.artigos.map(a=>({...a,capId:c.id,capNome:c.nome}))); }
// auto: linhas = { artigoId: percentualAcumulado }
function autoValorAcum(o, auto){
  let v=0;
  for(const a of allArtigos(o)){
    const p = auto.linhas[a.id]||0;
    v += artigoTotal(a)*(p/100);
  }
  return v;
}
function faturadoTotal(o){
  // valor do último auto (acumulado) — se não houver, 0
  if(!o.autos.length) return 0;
  const last = o.autos[o.autos.length-1];
  return autoValorAcum(o,last);
}
function execPercent(o){ const t=orcTotal(o); return t? faturadoTotal(o)/t*100 : 0; }
function custosTotal(o){ return o.custos.reduce((s,c)=>s+(c.valor||0),0); }

/* ============ RENDER PRINCIPAL ============ */
function render(){
  renderObraSelect();
  renderNav();
  if(!obra()){ $('#content').innerHTML = emptyObras(); $('#viewTitle').textContent='Obras'; wireView(); return; }
  // título
  let title='';
  if(currentView.startsWith('cap:')){ const m=chapMeta(currentView.slice(4)); title=currentView.slice(4)+' · '+(m?m[1]:''); }
  else { const titles={dashboard:'Resumo',cadastro:'Cadastro do Edifício',ficha:'Ficha de Compartimento',orcamento:'Orçamento (resumo)',autos:'Autos de Medição',custos:'Controlo de Custos',obra:'Gestão de Obra',obras:'Obras / Clientes'}; title=titles[currentView]||''; }
  $('#viewTitle').textContent = title;
  // conteúdo
  let html;
  if(currentView.startsWith('cap:')) html=viewCapitulo(currentView.slice(4));
  else { const fns={dashboard:viewDashboard,cadastro:viewCadastro,ficha:viewFicha,orcamento:viewOrcamento,autos:viewAutos,custos:viewCustos,obra:viewObra,obras:viewObras}; html=(fns[currentView]||viewDashboard)(); }
  $('#content').innerHTML = html;
  wireView();
  scheduleSave();
}

/* ============ DASHBOARD ============ */
function viewDashboard(){
  const o=obra();
  const orc=orcTotal(o), fat=faturadoTotal(o), cus=custosTotal(o), ex=execPercent(o);
  const margem = fat - cus;
  const margemPct = fat? margem/fat*100 : 0;
  const diasDecorridos = daysBetween(o.dataInicio, today());
  const diasPrazo = o.prazoDias||0;
  const prazoPct = diasPrazo? Math.min(diasDecorridos/diasPrazo*100,100):0;
  const pend = o.tarefas.filter(t=>t.estado!=='concluida').length;
  const atrasadas = o.tarefas.filter(t=>t.estado!=='concluida' && t.prazo && t.prazo<today()).length;

  return `
  <div class="grid kpis">
    <div class="kpi acc"><div class="lbl">Valor Orçamento</div><div class="val">${num(orc)} €</div><div class="sub">${o.capitulos.length} capítulos · ${allArtigos(o).length} artigos</div></div>
    <div class="kpi"><div class="lbl">Faturado (autos)</div><div class="val">${num(fat)} €</div><div class="sub">${pct(ex)} executado</div></div>
    <div class="kpi ${cus>fat?'bad':''}"><div class="lbl">Custos Reais</div><div class="val">${num(cus)} €</div><div class="sub">${o.custos.length} registos</div></div>
    <div class="kpi ${margem>=0?'ok':'bad'}"><div class="lbl">Margem</div><div class="val">${num(margem)} €</div><div class="sub">${pct(margemPct)} sobre faturado</div></div>
  </div>

  <div class="card">
    <div class="card-head"><h2>Execução da obra</h2></div>
    <div style="margin-bottom:18px">
      <div class="row-flex" style="margin-bottom:6px"><span class="mini">Trabalhos executados (autos)</span><span class="spacer"></span><span class="mini">${pct(ex)}</span></div>
      <div class="bar" style="height:10px"><div class="bar-fill" style="width:${Math.min(ex,100)}%"></div></div>
    </div>
    <div>
      <div class="row-flex" style="margin-bottom:6px"><span class="mini">Prazo decorrido (${diasDecorridos} / ${diasPrazo} dias)</span><span class="spacer"></span><span class="mini">${pct(prazoPct)}</span></div>
      <div class="bar" style="height:10px"><div class="bar-fill ${prazoPct>ex+15?'over':''}" style="width:${prazoPct}%"></div></div>
      ${prazoPct>ex+15?'<div class="mini" style="color:var(--warning);margin-top:8px">⚠ O prazo está a avançar mais depressa que a execução.</div>':''}
    </div>
  </div>

  <div class="grid" style="grid-template-columns:1fr 1fr">
    <div class="card">
      <div class="card-head"><h2>Orçamentado vs. Custo por capítulo</h2></div>
      <table><thead><tr><th>Capítulo</th><th class="num">Orçam.</th><th class="num">Custo</th></tr></thead><tbody>
      ${o.capitulos.map(c=>{
        const orcC=capTotal(c);
        const cusC=o.custos.filter(x=>x.capituloId===c.id).reduce((s,x)=>s+x.valor,0);
        return `<tr><td>${esc(c.nome)}</td><td class="num">${num(orcC)}</td><td class="num" style="color:${cusC>orcC?'var(--danger)':'var(--text)'}">${num(cusC)}</td></tr>`;
      }).join('')}
      </tbody></table>
    </div>
    <div class="card">
      <div class="card-head"><h2>Tarefas ${pend?`<span class="badge ${atrasadas?'r':'b'}">${pend} por fazer</span>`:''}</h2><button class="btn sm sec" data-goto="obra">Ver todas</button></div>
      ${o.tarefas.filter(t=>t.estado!=='concluida').slice(0,5).map(t=>`
        <div class="row-flex" style="padding:8px 0;border-bottom:1px solid var(--surface2)">
          <span class="badge ${t.prioridade==='alta'?'r':t.prioridade==='media'?'y':'gray'}">${t.prioridade}</span>
          <span>${esc(t.titulo)}</span><span class="spacer"></span>
          <span class="mini" style="color:${t.prazo<today()?'var(--danger)':'var(--muted)'}">${fmtDate(t.prazo)}</span>
        </div>`).join('') || '<div class="mini" style="padding:10px 0">Sem tarefas pendentes 🎉</div>'}
    </div>
  </div>`;
}

      <td class="num mini">${num(r.moE)}</td>
      <td class="num" style="font-weight:700;width:96px">${num(r.total)} €</td>

    <details style="margin-bottom:14px"><summary class="mini" style="cursor:pointer;padding:6px 0">⚙ Parâmetros base (custos, produtividades, margens) — clica para editar</summary>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-top:10px">${parHtml}</div>

/* Modal: escolher capítulo padrão A01-A27 ou personalizado */
function chapterModal(){
  const o=obra();
  const usados = new Set(o.capitulos.map(c=>(c.nome||'').slice(0,3)));
  const opts = STD_CHAPTERS.map(s=>{
    const nome = s[0]+' · '+s[1];
    const dis = usados.has(s[0]);
    return `<option value="${s[0]}" ${dis?'disabled':''}>${nome}${dis?'  (já adicionado)':''} — ${s[2]}</option>`;
  }).join('');
  openModal(`
    <h3>Adicionar capítulo</h3>
    <div class="field"><label>Capítulo padrão</label>
      <select id="ch_std"><option value="">— escolher —</option>${opts}
      <option value="__custom">Personalizado…</option></select></div>
    <div class="field hidden" id="ch_custom_wrap"><label>Nome do capítulo</label><input id="ch_custom" placeholder="Ex: Trabalhos diversos"></div>
    <div class="modal-actions"><button class="btn sec" data-close>Cancelar</button><button class="btn" id="ch_save">Adicionar</button></div>
  `);
  $('#ch_std').onchange=e=>{ $('#ch_custom_wrap').classList.toggle('hidden', e.target.value!=='__custom'); };
  $('#ch_save').onclick=()=>{
    const v=$('#ch_std').value;
    if(!v) return toast('Escolhe um capítulo');
    let nome, tipo, modo;
    if(v==='__custom'){ nome=$('#ch_custom').value.trim(); if(!nome) return toast('Dá um nome'); tipo='Personalizado'; modo='area'; }
    else { const s=STD_CHAPTERS.find(x=>x[0]===v); nome=s[0]+' · '+s[1]; tipo=s[2]; modo=s[3]; }
    o.capitulos.push({id:uid(), nome, tipo, modo, artigos:[]});
    // manter ordem A01..A27

/* Modal de edição de auto */
function autoModal(autoId){
  const o=obra();
  let au = o.autos.find(a=>a.id===autoId);
  const isNew=!au;
  if(isNew){
    const prevLinhas = o.autos.length? {...o.autos[o.autos.length-1].linhas} : {};
    au={id:uid(), numero:o.autos.length+1, data:today(), linhas:prevLinhas};
  }
  const rows = o.capitulos.map(c=>{
    const artRows = c.artigos.map(a=>{
      const p = au.linhas[a.id]||0;
      return `<tr>
        <td class="mini">${esc(a.codigo)}</td><td>${esc(a.designacao)}</td>
        <td class="num mini">${num(artigoTotal(a))} €</td>
        <td style="width:90px"><input class="tbl-inp num" type="number" min="0" max="100" step="any" data-autopct="${a.id}" value="${p}"></td>
        <td class="num mini" data-autoval="${a.id}">${num(artigoTotal(a)*p/100)} €</td></tr>`;
    }).join('');
    return `<tr class="cap-row"><td colspan="5">${esc(c.nome)}</td></tr>${artRows}`;
  }).join('');

  openModal(`
    <h3>${isNew?'Novo Auto de Medição':'Editar Auto '+au.numero}</h3>
    <div class="field-row">
      <div class="field"><label>Nº Auto</label><input id="au_num" type="number" value="${au.numero}"></div>
      <div class="field"><label>Data</label><input id="au_data" type="date" value="${au.data}"></div>
    </div>
    <p class="mini" style="margin-bottom:10px">Indica a <b>% acumulada executada</b> de cada artigo até esta data.</p>
    <div style="max-height:340px;overflow-y:auto;border:1px solid var(--border);border-radius:8px">
      <table><thead><tr><th>Cód</th><th>Artigo</th><th class="num">Total</th><th class="num">% acum.</th><th class="num">Valor</th></tr></thead>
      <tbody id="au_body">${rows}</tbody></table>
    </div>
    <div class="row-flex" style="margin-top:14px"><span class="mini">Valor acumulado deste auto:</span><span class="spacer"></span><b id="au_total" style="font-family:var(--mono);color:var(--accent)">${num(autoValorAcum(o,au))} €</b></div>
    <div class="modal-actions">
      <button class="btn sec" data-close>Cancelar</button>
      <button class="btn" id="au_save">Guardar Auto</button>
    </div>
  `);
  // live update
  $('#au_body').addEventListener('input', e=>{
    if(!e.target.dataset.autopct) return;
    const aid=e.target.dataset.autopct;
    const a=allArtigos(o).find(x=>x.id===aid);
    let p=parseFloat(e.target.value)||0; p=Math.max(0,Math.min(100,p));
    au.linhas[aid]=p;
    const cell=document.querySelector(`[data-autoval="${aid}"]`);
    if(cell) cell.textContent=num(artigoTotal(a)*p/100)+' €';
    $('#au_total').textContent=num(autoValorAcum(o,au))+' €';
  });
  $('#au_save').onclick=()=>{
    au.numero=parseInt($('#au_num').value)||au.numero;
    au.data=$('#au_data').value;
    if(isNew) o.autos.push(au);
    o.autos.sort((a,b)=>a.numero-b.numero);
    closeModal(); render(); toast('Auto guardado');
  };
}

function viewObra(){

  const ordP={alta:0,media:1,baixa:2};
  const tarefas=o.tarefas.slice().sort((a,b)=>{
    if((a.estado==='concluida')!==(b.estado==='concluida')) return a.estado==='concluida'?1:-1;

        <td style="text-align:right"><button class="btn dgr" data-deltarefa="${t.id}">✕</button></td></tr>`;
    }).join('') || '<tr><td colspan="6" class="mini" style="padding:20px">Sem tarefas.</td></tr>'}

/* Eventos por view (delegação) */
function wireView(){
  const c=$('#content');
  c.querySelectorAll('[data-goto]').forEach(b=>b.onclick=()=>{currentView=b.dataset.goto;render();});
  c.querySelectorAll('[data-export]').forEach(b=>b.onclick=()=>exportCSV(b.dataset.export));

  // ORÇAMENTO
  const NUMF = ['qtd','preco','puCusto','margem','comp','alt','ded'];
  const novaLinha=cap=>({id:uid(),codigo:'',designacao:'',unidade:capMode(cap)==='area'?'m²':'un',comp:'',alt:'',ded:'',qtd:0,puCusto:0,margem:0});
  c.querySelectorAll('[data-addcap]').forEach(b=>b.onclick=()=>chapterModal());
  c.querySelectorAll('[data-addart]').forEach(b=>b.onclick=()=>{const cap=obra().capitulos.find(x=>x.id===b.dataset.addart);cap.artigos.push(novaLinha(cap));render();});
  c.querySelectorAll('[data-addartcap]').forEach(b=>b.onclick=()=>{const cap=getCap(obra(),b.dataset.addartcap,true);cap.artigos.push(novaLinha(cap));render();});
  c.querySelectorAll('[data-delcap]').forEach(b=>b.onclick=()=>{if(confirm('Eliminar capítulo e as suas linhas?')){obra().capitulos=obra().capitulos.filter(x=>x.id!==b.dataset.delcap);render();}});
  c.querySelectorAll('[data-delart]').forEach(b=>b.onclick=()=>{const cap=obra().capitulos.find(x=>x.id===b.dataset.cap);cap.artigos=cap.artigos.filter(a=>a.id!==b.dataset.delart);render();});
  c.querySelectorAll('[data-edit]').forEach(inp=>{
    inp.addEventListener('change',()=>{
      const f=inp.dataset.edit;
      if(f==='capNome'){ const cap=obra().capitulos.find(x=>x.id===inp.dataset.cap); cap.nome=inp.value; }
      else{ const real=obra().capitulos.flatMap(c2=>c2.artigos).find(x=>x.id===inp.dataset.art);
        real[f]= NUMF.includes(f) ? (parseFloat(inp.value)||0) : inp.value; }
      render();
    });
  });

  // A05 BETÃO
  const a05of=()=>getCap(obra(),'A05',true).a05;
  const A05PCT=['despBetao','despAco','pctArame','indiretos','garantia','margem'];
  c.querySelectorAll('[data-a05sub]').forEach(b=>b.onclick=()=>{a05of().sub=b.dataset.a05sub;render();});
  c.querySelectorAll('[data-a05add]').forEach(b=>b.onclick=()=>{const a=a05of();a.tipos[a.sub].push({id:uid(),ref:'',qtd:1});render();});
  c.querySelectorAll('[data-a05del]').forEach(b=>b.onclick=()=>{const a=a05of();a.tipos[a.sub]=a.tipos[a.sub].filter(e=>e.id!==b.dataset.a05del);render();});
  c.querySelectorAll('[data-a05p]').forEach(inp=>inp.addEventListener('change',()=>{const a=a05of();a.params=a.params||{...A05_DEFAULTS};let v=parseFloat(inp.value)||0;const k=inp.dataset.a05p;a.params[k]=A05PCT.includes(k)?v/100:v;render();}));
  c.querySelectorAll('[data-a05e]').forEach(inp=>inp.addEventListener('change',()=>{const a=a05of();const el=a.tipos[a.sub].find(e=>e.id===inp.dataset.a05e);const f=inp.dataset.a05f;el[f]=(f==='ref')?inp.value:(parseFloat(inp.value)||0);render();}));

  // CADASTRO DO EDIFÍCIO
  c.querySelectorAll('[data-cad]').forEach(inp=>inp.addEventListener('change',()=>{obra().cadastro=obra().cadastro||{};obra().cadastro[inp.dataset.cad]=inp.value;scheduleSave();}));

  // FICHA DE COMPARTIMENTO
  c.querySelectorAll('[data-addcomp]').forEach(b=>b.onclick=()=>{const o=obra();o.compartimentos=o.compartimentos||[];o.compartimentos.push({id:uid(),nome:'',piso:'',comp:'',larg:'',pd:''});render();});
  c.querySelectorAll('[data-delcomp]').forEach(b=>b.onclick=()=>{const o=obra();o.compartimentos=o.compartimentos.filter(k=>k.id!==b.dataset.delcomp);render();});
  c.querySelectorAll('[data-compf]').forEach(inp=>inp.addEventListener('change',()=>{const k=obra().compartimentos.find(x=>x.id===inp.dataset.comp);const f=inp.dataset.compf;k[f]=['comp','larg','pd'].includes(f)?(parseFloat(inp.value)||0):inp.value;render();}));

  // AUTOS
  c.querySelectorAll('[data-newauto]').forEach(b=>b.onclick=()=>autoModal());
  c.querySelectorAll('[data-editauto]').forEach(b=>b.onclick=()=>autoModal(b.dataset.editauto));
  c.querySelectorAll('[data-delauto]').forEach(b=>b.onclick=()=>{if(confirm('Eliminar auto?')){obra().autos=obra().autos.filter(a=>a.id!==b.dataset.delauto);render();}});

  // CUSTOS
  c.querySelectorAll('[data-newcusto]').forEach(b=>b.onclick=()=>custoModal());
  c.querySelectorAll('[data-delcusto]').forEach(b=>b.onclick=()=>{obra().custos=obra().custos.filter(x=>x.id!==b.dataset.delcusto);render();});

  // OBRA / TAREFAS
  c.querySelectorAll('[data-newtarefa]').forEach(b=>b.onclick=()=>tarefaModal());
  c.querySelectorAll('[data-toggletarefa]').forEach(b=>b.onclick=()=>{const t=obra().tarefas.find(x=>x.id===b.dataset.toggletarefa);t.estado=t.estado==='concluida'?'pendente':'concluida';render();});
  c.querySelectorAll('[data-deltarefa]').forEach(b=>b.onclick=()=>{obra().tarefas=obra().tarefas.filter(x=>x.id!==b.dataset.deltarefa);render();});

  // OBRAS
  c.querySelectorAll('[data-openobra]').forEach(b=>b.onclick=()=>{currentObraId=b.dataset.openobra;currentView='dashboard';render();});
  c.querySelectorAll('[data-editobra]').forEach(b=>b.onclick=()=>obraModal(b.dataset.editobra));
  c.querySelectorAll('[data-delobra]').forEach(b=>b.onclick=()=>{if(confirm('Eliminar obra e todos os seus dados?')){const did=b.dataset.delobra;deleteObraApi(did);DB.obras=DB.obras.filter(o=>o.id!==did);if(currentObraId===did)currentObraId=DB.obras[0]?.id||null;render();}});
  const nb=c.querySelector('#newObraBtn2'); if(nb) nb.onclick=()=>obraModal();
  const fo=c.querySelector('#firstObra'); if(fo) fo.onclick=()=>obraModal();
}

/* ============ EXPORTAR CSV ============ */
function exportCSV(tipo){
  const o=obra(); let rows=[];
  if(tipo==='orc'){
    rows.push(['Capítulo','Código','Designação','Un','Comp','Alt','Ded','Qtd/Área','PU custo','Margem %','PV','Total']);
    o.capitulos.forEach(c=>{ c.artigos.forEach(a=>rows.push([c.nome,a.codigo||'',a.designacao||'',a.unidade||'',a.comp||'',a.alt||'',a.ded||'',artigoQtd(a),artigoPU(a),a.margem||0,artigoPV(a),artigoTotal(a)])); });
    rows.push(['','','','','','','','','','','SUBTOTAL',orcTotal(o)]);
    rows.push(['','','','','','','','','','','IVA '+IVA+'%',orcIVA(o)]);
    rows.push(['','','','','','','','','','','TOTAL C/IVA',orcTotalComIVA(o)]);
  }else if(tipo==='custos'){
    rows.push(['Data','Descrição','Fornecedor','Capítulo','Valor']);
    o.custos.forEach(x=>{const cap=o.capitulos.find(c=>c.id===x.capituloId);rows.push([x.data,x.descricao,x.fornecedor||'',cap?cap.nome:'geral',x.valor]);});
  }
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(';')).join('\n');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`${tipo}_${o.nome.replace(/\s+/g,'_')}.csv`; a.click();
  toast('CSV exportado');
}

/* ARRANQUE */
boot();
